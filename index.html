<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
       <style>
        * {
            margin: 0;
        }

        .bg1 {
            background-color: blueviolet;
        }

        .bg2 {
            background-color: aqua;
        }

        .bg3 {
            background-color: palevioletred;
        }

        .bg4 {
            background-color:violet;
        }

        .fl {
            float: left;
        }

        .new {
            float: left;
            margin-left: 1%;
        }

        .fr {
            float: right;
        }



        .wrapper {
            width: 90%;
            /* px  , vh  */
            height: 80vh;

            /* y , x */
            margin: 10vh auto;
        }

        .col-4 {
            width: 24.25%;
            height: 80vh;
        }

        .col {
            height: 19.2vh;
            margin-bottom: 1vh;
        }

        .col-2 {
            width: 49%;
            height: 19.2vh;
        }
    </style>
  
            
<body>
   <div class="wrapper">
        <div class="col-4 fl">
            <div class="col">
                <div class="col-2 bg1 fl"></div>
                <div class="col-2 bg2 fr"></div>
            </div>
            <div class="col ">
                <div class="col-2 bg3 fl"></div>
                <div class="col-2 bg4 fr"></div>
            </div>
            <div class="col bg3"></div>
            <div class="col bg4"></div>
        </div>
        <div class="col-4 new">
            <div class="col bg1"></div>
            <div class="col bg2"></div>
            <div class="col bg3"></div>
            <div class="col bg4"></div>
        </div>
        <div class="col-4 new">
            <div class="col bg1"></div>
            <div class="col bg2"></div>
            <div class="col ">
                <div class="col-2 bg1 fl"></div>
                <div class="col-2 bg2 fr"></div>
            </div>
            <div class="col">
                <div class="col-2 bg1 fl"></div>
                <div class="col-2 bg2 fr"></div>
            </div>
        </div>
        <div class="col-4 fr">
            <div class="col bg1"></div>
            <div class="col">
                <div class="col-2 bg1 fl"></div>
                <div class="col-2 bg2 fr"></div>
            </div>
            <div class="col bg3"></div>
            <div class="col">
                <div class="col-2 bg1 fl"></div>
                <div class="col-2 bg2 fr"></div>
            </div>
        </div>

    </div>


</body>
    
</body>
</html>
